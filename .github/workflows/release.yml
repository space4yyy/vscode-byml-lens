name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - 'README_ZH.md'
      - 'LICENSE'
      - '.gitignore'
      - 'byml-aliases.yml'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'README_ZH.md'
      - 'LICENSE'
      - '.gitignore'
      - 'byml-aliases.yml'

env:
  # Suppress Node 20 deprecation warnings by allowing it explicitly
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

# Prevent duplicate runs for the same commit/ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Bundle
        run: npm run bundle

      - name: Package Extension
        run: npx @vscode/vsce package -o byml-lens-${{ steps.get_version.outputs.VERSION }}.vsix --no-dependencies

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: byml-lens-vsix
          path: byml-lens-${{ steps.get_version.outputs.VERSION }}.vsix

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: byml-lens-vsix

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: byml-lens-${{ needs.build.outputs.version }}.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Marketplace
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }} --packagePath byml-lens-${{ needs.build.outputs.version }}.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
